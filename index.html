<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Art Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#000000,#434343);
    padding:40px;
    text-align:center;
    color:white;
}

h1{
    margin-bottom:30px;
    letter-spacing:2px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
    border:2px solid #ff4d6d;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #ff4d6d;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}

.caption{
    padding:10px;
    font-size:14px;
    color:#ffccd5;
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:30px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Street Art Collection</h1>

<div class="gallery">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800" onclick="openImage(this.src)">
        <div class="caption">Urban Graffiti</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=800" onclick="openImage(this.src)">
        <div class="caption">Creative Wall Art</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=800" onclick="openImage(this.src)">
        <div class="caption">Colorful Mural</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=800" onclick="openImage(this.src)">
        <div class="caption">Modern Street Style</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800" onclick="openImage(this.src)">
        <div class="caption">Spray Paint Art</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1500534623283-312aade485b7?w=800" onclick="openImage(this.src)">
        <div class="caption">City Expression</div>
    </div>

</div>

<!-- Lightbox Popup -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeImage()">✖</span>
    <img id="popup-img">
</div>

<script>
function openImage(src){
    document.getElementById("popup-img").src = src;
    document.getElementById("lightbox").style.display = "flex";
}

function closeImage(){
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
